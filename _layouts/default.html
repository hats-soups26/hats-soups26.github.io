<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <link rel="stylesheet" href="{{ "/assets/css/custom.css" | relative_url }}">
    {% include head-custom.html %}
    <link rel="icon" href="{{ "/favicon.ico" | relative_url }}" type="image/x-icon">
  </head>
  <body>
    {% assign home_url = "/" | relative_url %}
    {% assign accepted_url = "/accepted-papers.html" | relative_url %}

    <div class="container-lg px-3 my-5 markdown-body">
      {% if page.url != "/" and page.url != "/index.html" %}
      <header class="site-header">
        <a class="site-brand" href="{{ home_url }}" aria-label="HATS Workshop home">
          <img src="{{ site.logo | default: '/hats_v0.png' | relative_url }}" alt="HATS Workshop logo">
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ home_url }}" {% if page.url == "/" or page.url == "/index.html" %}aria-current="page"{% endif %}>Home</a>
          <a href="{{ accepted_url }}" {% if page.url == "/accepted-papers.html" %}aria-current="page"{% endif %}>Accepted Papers</a>
        </nav>
      </header>
      {% endif %}

      {{ content }}
    </div>
  </body>
</html>
